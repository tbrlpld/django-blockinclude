<div data-test="the-box" style="display: flex; flex-direction: column; gap: 2rem; border: 3px solid ButtonBorder; padding: 3rem;">
    {% if header %}
        <header style="border: 1px solid ButtonBorder; padding: 3rem;">
            {{ header }}
        </header>
    {% endif %}

    <div>
        {{ content }}
    </div>

    {% if footer %}
        <footer style="border: 1px solid ButtonBorder; padding: 3rem;">
            {{ footer }}
        </footer>
    {% endif %}
</div>
