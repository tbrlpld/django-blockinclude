{% load blockinclude %}

{% blockinclude "./the-box.html" with extra_style="display: flex; flex-direction: column; gap: 2rem;" %}
    {% if header %}
        <header style="border: 1px solid ButtonBorder; padding: 3rem;">
            {{ header }}
        </header>
    {% endif %}

    <div>
        {{ content }}
    </div>

    {% if footer %}
        <footer style="border: 1px solid ButtonBorder; padding: 3rem;">
            {{ footer }}
        </footer>
    {% endif %}
{% endblockinclude %}
